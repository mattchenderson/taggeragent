# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: taggeragent
metadata:
    template: taggeragent@0.0.2-beta
services:
    functions:
        project: ./src/TaggerAgent.Functions
        host: function
        language: dotnet
    tagger-agent:
        project: ./src/TaggerAgent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
                scale:
                    maxReplicas: 3
                    minReplicas: 1
                environment_variables:
                    AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID}
                    RULES_STORAGE_URL: ${RULES_STORAGE_URL}
                    AZURE_AI_PROJECT_ENDPOINT: ${AZURE_AI_PROJECT_ENDPOINT}
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4o-mini
                    version: "2024-07-18"
                  name: gpt-4o-mini
                  sku:
                    capacity: 30
                    name: Standard
infra:
    provider: bicep
    path: ./infra
